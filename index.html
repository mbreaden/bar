<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c9a84c;
    --accent2: #8b4513;
    --text: #e8e0d0;
    --muted: #7a7060;
    --tag-bg: #1a1a1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  header {
    padding: 32px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 24px;
    flex-wrap: wrap;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .subtitle {
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .controls {
    padding: 16px 40px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  input[type=search] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 8px 14px;
    width: 280px;
    outline: none;
    border-radius: 2px;
  }

  input[type=search]:focus {
    border-color: var(--accent);
  }

  input[type=search]::placeholder { color: var(--muted); }

  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .pill {
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    border-radius: 2px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); color: #0d0d0d; border-color: var(--accent); font-weight: 500; }

  .count {
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.05em;
    margin-left: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 10px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 57px;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }

  thead th:hover { color: var(--accent); }
  thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface); }

  td {
    padding: 10px 16px;
    vertical-align: top;
    line-height: 1.5;
  }

  .td-id { color: var(--muted); width: 48px; font-size: 11px; }

  .td-name { font-weight: 500; color: var(--text); min-width: 200px; }

  .td-producer { color: var(--muted); font-size: 12px; min-width: 140px; }

  .cat-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }

  .td-sub { color: #9a8f7a; font-size: 12px; }

  .td-notes { color: var(--muted); font-size: 12px; max-width: 320px; line-height: 1.4; }

  .no-results {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 0.05em;
  }

  /* Category colors */
  .cat-gin { background: #1a2a1a; color: #6ab86a; border: 1px solid #2a3a2a; }
  .cat-vodka { background: #1a1a2a; color: #6a8ab8; border: 1px solid #2a2a3a; }
  .cat-whisky { background: #2a1a08; color: #c9843c; border: 1px solid #3a2a18; }
  .cat-rum { background: #1a0a0a; color: #c96a6a; border: 1px solid #2a1a1a; }
  .cat-tequila { background: #1a1a0a; color: #b8b84a; border: 1px solid #2a2a1a; }
  .cat-brandy { background: #1e0e16; color: #c87ab0; border: 1px solid #2e1e26; }
  .cat-liqueur { background: #0a1a1a; color: #4ab0b0; border: 1px solid #1a2a2a; }
  .cat-amaro { background: #1a0e0e; color: #c06060; border: 1px solid #2a1a1a; }
  .cat-bitters { background: #100818; color: #9870c0; border: 1px solid #201028; }
  .cat-vermouth { background: #181018; color: #a87ab8; border: 1px solid #281828; }
  .cat-syrup { background: #0e180a; color: #78b050; border: 1px solid #1e280a; }
  .cat-juice { background: #180e00; color: #d09050; border: 1px solid #280e00; }
  .cat-mixer { background: #101018; color: #7880b0; border: 1px solid #202028; }
  .cat-other { background: #141414; color: #888888; border: 1px solid #242424; }

  .new-badge {
    display: inline-block;
    background: var(--accent);
    color: #0d0d0d;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    padding: 1px 5px;
    border-radius: 2px;
    vertical-align: middle;
    margin-left: 6px;
    text-transform: uppercase;
  }

  /* Mobile sort control — hidden on desktop (clickable headers used there) */
  #mobileSort {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 8px 12px;
    border-radius: 2px;
    outline: none;
  }

  /* ---- Mobile / narrow-screen layout ---- */
  @media (max-width: 680px) {
    header { padding: 18px 16px 12px; gap: 6px; }
    header h1 { font-size: 22px; }
    .subtitle { font-size: 11px; }

    .controls { padding: 12px 16px; gap: 10px; top: 0; }
    input[type=search] { width: 100%; font-size: 16px; } /* 16px stops iOS focus-zoom */
    #mobileSort { display: block; width: 100%; }
    .count { margin-left: 0; }

    /* Filter pills: single scrolling row keeps the sticky bar short */
    .filter-row {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
      padding-bottom: 2px;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .pill { flex: 0 0 auto; padding: 8px 13px; }

    /* Table -> cards */
    thead { display: none; }
    #mainTable, tbody, tr, td { display: block; width: 100%; }
    tbody tr {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin: 0 16px 12px;
    }
    tbody tr:hover { background: var(--surface); }
    td {
      display: flex;
      gap: 10px;
      padding: 3px 0;
      width: 100%;
      max-width: none;
      min-width: 0;
      border: none;
    }
    td::before {
      content: attr(data-label);
      flex: 0 0 70px;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding-top: 3px;
    }
    td[data-empty] { display: none; }

    .td-id { width: 100%; }
    .td-id::before { content: '#'; }
    .td-name { font-size: 15px; font-weight: 500; padding-bottom: 4px; }
    .td-name::before { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>Bar Inventory</h1>
  <span class="subtitle">as of 1 Jun 2026 &nbsp;·&nbsp; <span id="totalCount"></span> items</span>
</header>

<div class="controls">

    <option data-col="name" data-dir="1">Sort: Name (A–Z)</option>
    <option data-col="name" data-dir="-1">Sort: Name (Z–A)</option>
    <option data-col="category" data-dir="1">Sort: Category</option>
    <option data-col="producer" data-dir="1">Sort: Producer</option>
    <option data-col="sub_style" data-dir="1">Sort: Style</option>
  </select>
  <div class="filter-row" id="catFilters"></div>
  <span class="count" id="rowCount"></span>
</div>

<div style="overflow-x:auto;">
<table id="mainTable">
  <thead>
    <tr>
      <th class="td-id" data-col="id">ID</th>
      <th data-col="name">Name</th>
      <th data-col="producer">Producer</th>
      <th data-col="category">Category</th>
      <th data-col="sub_style">Style</th>
      <th data-col="notes">Notes</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
<div id="noResults" class="no-results" style="display:none">No items match.</div>

ed cocktail", "notes": "Kept in stock in quantity"}, {"id": 116, "name": "Barrel-Aged Vieux Carr\u00e9", "producer": "", "category": "other", "sub_style": "barrel-aged cocktail", "notes": "Kept in stock in quantity"}];

const NEW_IDS = new Set([112, 113, 114, 115, 116]);

document.getElementById('totalCount').textContent = INVENTORY.length;

const CAT_ORDER = ['gin','vodka','whisky','rum','tequila','brandy','liqueur','amaro','bitters','vermouth','syrup','juice','mixer','other'];

let activeCategories = new Set();
let sortCol = 'id';
let sortDir = 1;
let searchVal = '';

// Build category filter pills
const filterRow = document.getElementById('catFilters');
const allCats = [...new Set(INVENTORY.map(i => i.category))].sort((a,b) => {
  return CAT_ORDER.indexOf(a) - CAT_ORDER.indexOf(b);
});

allCats.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.cat = cat;
  const count = INVENTORY.filter(i => i.category === cat).length;
  btn.textContent = cat + ' (' + count + ')';
  btn.addEventListener('click', () => {
    if (activeCategories.has(cat)) {
      activeCategories.delete(cat);
      btn.classList.remove('active');
    } else {
      activeCategories.add(cat);
      btn.classList.add('active');
    }
    render();
  });
  filterRow.appendChild(btn);
});

// Search
document.getElementById('searchBox').addEventListener('input', e => {
  searchVal = e.target.value.toLowerCase();
  render();
});

// Mobile sort select
document.getElementById('mobileSort').addEventListener('change', e => {
  const o = e.target.options[e.target.selectedIndex];
  sortCol = o.dataset.col;
  sortDir = Number(o.dataset.dir);
  render();
});

// Sort
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    render();
    document.querySelectorAll('thead th').forEach(t => t.classList.remove('sort-asc','sort-desc'));
    th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
});

function catClass(cat) {
  return 'cat-badge cat-' + (cat || 'other');
}

function render() {
  let data = INVENTORY.slice();

  if (activeCategories.size > 0) {
    data = data.filter(i => activeCategories.has(i.category));
  }

  if (searchVal) {
    data = data.filter(i =>
      (i.name||'').toLowerCase().includes(searchVal) ||
      (i.producer||'').toLowerCase().includes(searchVal) ||
      (i.notes||'').toLowerCase().includes(searchVal) ||
      (i.sub_style||'').toLowerCase().includes(searchVal) ||
      (i.category||'').toLowerCase().includes(searchVal)
    );
  }

  data.sort((a, b) => {
    let av = a[sortCol], bv = b[sortCol];
    if (sortCol === 'id') { av = Number(av); bv = Number(bv); }
    else { av = (av||'').toString().toLowerCase(); bv = (bv||'').toString().toLowerCase(); }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  data.forEach(item => {
    const tr = document.createElement('tr');
    const isNew = NEW_IDS.has(item.id);
    tr.innerHTML = `
      <td class="td-id" data-label="ID">${item.id}</td>
      <td class="td-name" data-label="Name">${escHtml(item.name)}${isNew ? '<span class="new-badge">new</span>' : ''}</td>
      <td class="td-producer" data-label="Producer"${item.producer ? '' : ' data-empty'}>${escHtml(item.producer||'')}</td>
      <td data-label="Category"><span class="${catClass(item.category)}">${escHtml(item.category)}</span></td>
      <td class="td-sub" data-label="Style"${item.sub_style ? '' : ' data-empty'}>${escHtml(item.sub_style||'')}</td>
      <td class="td-notes" data-label="Notes"${item.notes ? '' : ' data-empty'}>${escHtml(item.notes||'')}</td>
    `;
    tbody.appendChild(tr);
  });

  const nr = document.getElementById('noResults');
  document.getElementById('mainTable').style.display = data.length ? '' : 'none';
  nr.style.display = data.length ? 'none' : 'block';
  document.getElementById('rowCount').textContent = data.length + ' of ' + INVENTORY.length;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
