<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar</title>
<!--
  Home Bar Tool — design choices:

  1. Aesthetic: refined utilitarian / terminal-adjacent. Dark by default.
     Dense rows over big photo cards. Mono for data, serif for cocktail
     names so they read like recipes, not log lines.

  2. Matching logic (the only non-trivial bit):
     An ingredient is "matched" iff at least one bottle in inventory
     satisfies one of:
       - match_name === bottle.name
       - match_category === bottle.category
       - match_sub_style === bottle.sub_style
     If the ingredient has NO match_* fields, it's treated as
     "assumed available" — fresh stuff (citrus, egg, mint), mixers
     (soda, tonic, cola, prosecco), or cocktails.json's real gaps
     (mezcal, orgeat, maraschino, Amaro Nonino, etc).
     The author of cocktails.json deliberately didn't add match_*
     fields for those — so I respect that. Tell me if you want
     stricter checking.

     "missing_count" = number of ingredients that DID specify match_*
     fields but found nothing in inventory.
       - makeable now: missing_count === 0
       - one away:    missing_count === 1
       - all:         everything

  3. Multi-match: when an ingredient could be satisfied by N>1 bottles
     (e.g. "gin" matches 11 of your gins), default shows the first
     and a "(N options)" pill — click the pill to pick a specific one.
     Choice is persisted to localStorage per (cocktail, ingredient).

  4. No external CSS/JS. Two fetches: inventory.json + cocktails.json.

  5. Dense table-y layout, sticky header, fast filtering — all
     in-memory, no debouncing needed for this data size (~100 + ~80).
-->
<style>
  :root {
    --bg: #0e0f12;
    --bg-1: #15171c;
    --bg-2: #1c1f26;
    --bg-hover: #232730;
    --border: #2a2e38;
    --border-2: #383d49;
    --fg: #e6e6e6;
    --fg-dim: #9ca3af;
    --fg-dimmer: #6b7280;
    --accent: #d4a574;      /* warm amber, like backbar light */
    --accent-dim: #8a6d4a;
    --green: #7fb069;
    --red: #c87878;
    --yellow: #d4b574;
    --mono: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace;
    --serif: "Cormorant Garamond", "Iowan Old Style", "Palatino", Georgia, serif;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  body {
    min-height: 100vh;
  }

  /* ===== Header ===== */
  header {
    position: sticky; top: 0; z-index: 10;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
  }
  .header-row {
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .brand {
    font-family: var(--serif);
    font-size: 22px;
    font-style: italic;
    letter-spacing: 0.5px;
    color: var(--accent);
    margin-right: 4px;
  }
  .view-toggle {
    display: flex;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }
  .view-toggle button {
    background: transparent;
    border: 0;
    color: var(--fg-dim);
    padding: 6px 14px;
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
  }
  .view-toggle button.active {
    background: var(--accent);
    color: var(--bg);
  }
  .stats {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dim);
  }
  .stats b { color: var(--accent); font-weight: normal; }

  /* ===== Controls row ===== */
  .controls {
    display: flex;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    align-items: center;
  }
  .controls input[type="text"],
  .controls select {
    background: var(--bg-1);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 10px;
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }
  .controls input[type="text"]:focus,
  .controls select:focus {
    border-color: var(--accent-dim);
  }
  .controls input[type="text"] {
    min-width: 200px;
    flex: 1 1 200px;
    max-width: 360px;
  }
  .pill-group {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .pill {
    background: var(--bg-1);
    color: var(--fg-dim);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 4px 10px;
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    cursor: pointer;
    user-select: none;
  }
  .pill:hover { background: var(--bg-hover); color: var(--fg); }
  .pill.active {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }
  .label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ===== My Bar view ===== */
  .bar-list {
    padding: 0;
  }
  .bar-row {
    display: grid;
    grid-template-columns: 60px 1.3fr 1fr 110px 130px 1.2fr;
    gap: 12px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    align-items: baseline;
    font-size: 13px;
  }
  .bar-row:hover { background: var(--bg-1); }
  .bar-row .id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dimmer);
  }
  .bar-row .name { font-weight: 500; }
  .bar-row .producer { color: var(--fg-dim); font-size: 12px; }
  .bar-row .cat-pill {
    display: inline-block;
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--accent);
  }
  .bar-row .substyle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dim);
  }
  .bar-row .notes {
    color: var(--fg-dimmer);
    font-size: 12px;
    font-style: italic;
  }
  .bar-header {
    display: grid;
    grid-template-columns: 60px 1.3fr 1fr 110px 130px 1.2fr;
    gap: 12px;
    padding: 8px 16px;
    background: var(--bg-1);
    border-bottom: 1px solid var(--border-2);
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--fg-dimmer);
    position: sticky;
    top: 96px;
    z-index: 5;
  }

  /* ===== Cocktails view ===== */
  .cocktails-list {
    padding: 8px 16px 32px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 8px;
  }
  .cocktail {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
    position: relative;
  }
  .cocktail.unmakeable {
    opacity: 0.55;
    border-style: dashed;
  }
  .cocktail.oneaway {
    border-left: 2px solid var(--yellow);
  }
  .cocktail.makeable {
    border-left: 2px solid var(--green);
  }
  .cocktail .title-row {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px;
    margin-bottom: 4px;
  }
  .cocktail h3 {
    font-family: var(--serif);
    font-size: 20px;
    font-weight: 500;
    margin: 0;
    line-height: 1.1;
    color: var(--fg);
  }
  .cocktail .badge {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .badge.makeable {
    background: rgba(127,176,105,0.15);
    color: var(--green);
    border: 1px solid rgba(127,176,105,0.3);
  }
  .badge.oneaway {
    background: rgba(212,181,116,0.15);
    color: var(--yellow);
    border: 1px solid rgba(212,181,116,0.3);
  }
  .badge.unmakeable {
    background: rgba(200,120,120,0.15);
    color: var(--red);
    border: 1px solid rgba(200,120,120,0.3);
  }
  .cocktail .category {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--fg-dimmer);
    margin-bottom: 8px;
  }
  .ingredients {
    list-style: none;
    padding: 0;
    margin: 8px 0;
    border-top: 1px dotted var(--border);
    border-bottom: 1px dotted var(--border);
    padding: 6px 0;
  }
  .ingredients li {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 8px;
    padding: 2px 0;
    font-size: 12px;
    align-items: baseline;
  }
  .ingredients .amt {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dim);
    text-align: right;
    white-space: nowrap;
  }
  .ingredients .ing {
    color: var(--fg);
  }
  .ingredients .bottle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    display: inline;
  }
  .ingredients .bottle::before {
    content: "→ ";
    color: var(--fg-dimmer);
  }
  .ingredients .missing {
    color: var(--red);
    font-family: var(--mono);
    font-size: 11px;
    font-style: italic;
  }
  .ingredients .missing::before {
    content: "✗ missing ";
    color: var(--fg-dimmer);
    font-style: normal;
  }
  .ingredients .assumed {
    color: var(--fg-dimmer);
    font-size: 11px;
    font-style: italic;
  }
  .options-link {
    background: var(--bg-2);
    color: var(--accent);
    border: 1px solid var(--border-2);
    border-radius: 2px;
    padding: 0 6px;
    margin-left: 4px;
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
  }
  .options-link:hover {
    background: var(--bg-hover);
  }
  .method {
    font-size: 12px;
    color: var(--fg-dim);
    margin: 6px 0;
    line-height: 1.5;
  }
  .meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--fg-dimmer);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-top: 4px;
  }
  .meta span { margin-right: 10px; }
  .meta b { color: var(--fg-dim); font-weight: normal; }
  .tags {
    margin-top: 6px;
    display: flex; flex-wrap: wrap; gap: 3px;
  }
  .tag {
    font-family: var(--mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--fg-dimmer);
    background: var(--bg-2);
    padding: 1px 5px;
    border-radius: 2px;
  }
  .note {
    font-size: 11px;
    color: var(--fg-dimmer);
    font-style: italic;
    margin-top: 4px;
  }

  /* ===== Modal for bottle picker ===== */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-2);
    border-radius: 4px;
    max-width: 520px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    padding: 16px;
  }
  .modal h4 {
    margin: 0 0 4px;
    font-family: var(--serif);
    font-size: 18px;
    font-style: italic;
    color: var(--accent);
  }
  .modal .sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg-dim);
    margin-bottom: 12px;
  }
  .modal-option {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--bg-2);
    border: 1px solid var(--border);
    color: var(--fg);
    padding: 8px 12px;
    margin-bottom: 4px;
    border-radius: 3px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
  }
  .modal-option:hover {
    background: var(--bg-hover);
    border-color: var(--accent-dim);
  }
  .modal-option.selected {
    border-color: var(--accent);
    color: var(--accent);
  }
  .modal-option .sub2 {
    color: var(--fg-dimmer);
    font-size: 10px;
    margin-top: 2px;
  }

  /* ===== Hidden helpers ===== */
  .hidden { display: none !important; }
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--fg-dimmer);
    font-family: var(--mono);
    font-size: 12px;
  }

  /* ===== Mobile ===== */
  @media (max-width: 720px) {
    .bar-row, .bar-header {
      grid-template-columns: 1fr;
      gap: 2px;
      padding: 10px 12px;
    }
    .bar-header { display: none; }
    .bar-row .id { display: none; }
    .bar-row .producer::before { content: "by "; color: var(--fg-dimmer); }
    .bar-row .substyle::before { content: "style: "; color: var(--fg-dimmer); }
    .cocktails-list {
      grid-template-columns: 1fr;
      padding: 8px 12px 32px;
    }
    .controls { padding: 8px 12px; }
    header { padding: 8px 12px; }
    .stats { margin-left: 0; width: 100%; }
    .brand { font-size: 18px; }
  }
</style>
</head>
<body>

<header>

    <div class="view-toggle">
      <button id="view-bar" class="active">My Bar</button>
      <button id="view-cocktails">Cocktails</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>
</header>

<!-- My Bar controls -->
<div class="controls" id="bar-controls">

    <option value="category">category</option>

  </select>
  <span class="label" style="width:100%; margin-top:4px;">tags (any):</span>
  <div class="pill-group" id="tag-filters" style="width:100%"></div>
</div>

<!-- My Bar view -->
<div id="bar-view">
  <div class="bar-header">
    <div>id</div><div>name</div><div>producer</div>
    <div>category</div><div>sub-style</div><div>notes</div>
  </div>
  <div class="bar-list" id="bar-list"></div>
</div>

<!-- Cocktails view -->
<div id="cocktails-view" class="hidden">

</div>

<!-- Bottle picker modal -->
<div class="modal-backdrop" id="modal">

    <h4 id="modal-title"></h4>
    <div class="sub" id="modal-sub"></div>
    <div id="modal-options"></div>
  </div>
</div>

function load() {
  inventory = INVENTORY_DATA;
  cocktails = COCKTAILS_DATA;
  try {
    bottleChoices = JSON.parse(localStorage.getItem(LS_KEY) || "{}");
  } catch (e) { bottleChoices = {}; }
  init();
}

function saveChoices() {
  localStorage.setItem(LS_KEY, JSON.stringify(bottleChoices));
}

// ============================================================
// Match logic
// ============================================================
// Returns array of bottle objects that satisfy the ingredient.
function bottlesFor(ing) {
  if (!ing.match_name && !ing.match_category && !ing.match_sub_style) {
    return null; // means "assumed available" — not an inventory ingredient
  }
  return inventory.filter(b => {
    if (ing.match_name && b.name === ing.match_name) return true;
    if (ing.match_category && b.category === ing.match_category) return true;
    if (ing.match_sub_style && b.sub_style === ing.match_sub_style) return true;
    return false;
  });
}

// Annotate a cocktail with per-ingredient status + overall makeability.
function annotate(cocktail) {
  const ings = cocktail.ingredients.map((ing, idx) => {
    const matches = bottlesFor(ing);
    if (matches === null) {
      return { ...ing, idx, status: "assumed", matches: [] };
    }
    if (matches.length === 0) {
      return { ...ing, idx, status: "missing", matches: [] };
    }
    return { ...ing, idx, status: "matched", matches };
  });
  const missingCount = ings.filter(i => i.status === "missing").length;
  let state;
  if (missingCount === 0) state = "makeable";
  else if (missingCount === 1) state = "oneaway";
  else state = "unmakeable";
  return { ...cocktail, annotated: ings, missingCount, state };
}

function chosenBottleFor(cocktailId, ing) {
  if (ing.matches.length === 0) return null;
  const key = cocktailId + ":" + ing.idx;
  const chosenId = bottleChoices[key];
  if (chosenId) {
    const b = ing.matches.find(m => m.id === chosenId);
    if (b) return b;
  }
  return ing.matches[0];
}

// ============================================================
// Init UI
// ============================================================
function init() {
  // Build category filters for bar
  const cats = [...new Set(inventory.map(b => b.category))].sort();
  const catCounts = {};
  inventory.forEach(b => { catCounts[b.category] = (catCounts[b.category] || 0) + 1; });

  const catContainer = document.getElementById("bar-cat-filters");
  const allBtn = document.createElement("button");
  allBtn.className = "pill active";
  allBtn.textContent = `all (${inventory.length})`;
  allBtn.onclick = () => setBarCat(null);
  catContainer.appendChild(allBtn);
  cats.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.textContent = `${c} (${catCounts[c]})`;
    btn.dataset.cat = c;
    btn.onclick = () => setBarCat(c);
    catContainer.appendChild(btn);
  });

  // Build tag filters
  const allTags = new Set();
  cocktails.forEach(c => (c.tags || []).forEach(t => allTags.add(t)));
  const tagContainer = document.getElementById("tag-filters");
  [...allTags].sort().forEach(t => {
    const btn = document.createElement("button");
    btn.className = "pill";
    btn.textContent = t;
    btn.onclick = () => {
      if (tagFilters.has(t)) tagFilters.delete(t);
      else tagFilters.add(t);
      btn.classList.toggle("active");
      renderCocktails();
    };
    tagContainer.appendChild(btn);
  });

  // Wire up search/sort/mode
  document.getElementById("bar-search").addEventListener("input", e => {
    barSearch = e.target.value.toLowerCase();
    renderBar();
  });
  document.getElementById("cocktail-search").addEventListener("input", e => {
    cocktailSearch = e.target.value.toLowerCase();
    renderCocktails();
  });
  document.getElementById("cocktail-sort").addEventListener("change", e => {
    cocktailSort = e.target.value;
    renderCocktails();
  });
  document.querySelectorAll(".pill[data-mode]").forEach(b => {
    b.onclick = () => {
      document.querySelectorAll(".pill[data-mode]").forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      cocktailMode = b.dataset.mode;
      renderCocktails();
    };
  });

  // View switch
  document.getElementById("view-bar").onclick = () => setView("bar");
  document.getElementById("view-cocktails").onclick = () => setView("cocktails");

  // Modal close
  document.getElementById("modal").onclick = e => {
    if (e.target.id === "modal") closeModal();
  };

  renderBar();
}

function setView(v) {
  view = v;
  document.getElementById("view-bar").classList.toggle("active", v === "bar");
  document.getElementById("view-cocktails").classList.toggle("active", v === "cocktails");
  document.getElementById("bar-view").classList.toggle("hidden", v !== "bar");
  document.getElementById("cocktails-view").classList.toggle("hidden", v !== "cocktails");
  document.getElementById("bar-controls").classList.toggle("hidden", v !== "bar");
  document.getElementById("cocktail-controls").classList.toggle("hidden", v !== "cocktails");
  if (v === "bar") renderBar();
  else renderCocktails();
}

function setBarCat(cat) {
  barCatFilter = cat;
  document.querySelectorAll("#bar-cat-filters .pill").forEach(p => {
    const matches = cat === null
      ? p.textContent.startsWith("all")
      : p.dataset.cat === cat;
    p.classList.toggle("active", matches);
  });
  renderBar();
}

// ============================================================
// Render: Bar
// ============================================================
function renderBar() {
  const list = document.getElementById("bar-list");
  const q = barSearch;
  const filtered = inventory.filter(b => {
    if (barCatFilter && b.category !== barCatFilter) return false;
    if (!q) return true;
    return (
      b.name.toLowerCase().includes(q) ||
      (b.producer || "").toLowerCase().includes(q) ||
      (b.notes || "").toLowerCase().includes(q) ||
      (b.sub_style || "").toLowerCase().includes(q)
    );
  });

  list.innerHTML = "";
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">no bottles match</div>';
  } else {
    const frag = document.createDocumentFragment();
    filtered.forEach(b => {
      const row = document.createElement("div");
      row.className = "bar-row";
      row.innerHTML = `
        <div class="id">#${b.id}</div>
        <div class="name">${escapeHtml(b.name)}</div>
        <div class="producer">${escapeHtml(b.producer || "—")}</div>
        <div><span class="cat-pill">${escapeHtml(b.category)}</span></div>
        <div class="substyle">${escapeHtml(b.sub_style || "—")}</div>
        <div class="notes">${escapeHtml(b.notes || "")}</div>
      `;
      frag.appendChild(row);
    });
    list.appendChild(frag);
  }

  // Stats
  const total = inventory.length;
  document.getElementById("stats").innerHTML =
    `<b>${filtered.length}</b> / ${total} bottles`;
}

// ============================================================
// Render: Cocktails
// ============================================================
function renderCocktails() {
  const list = document.getElementById("cocktails-list");
  list.innerHTML = "";

  const annotated = cocktails.map(annotate);

  // Filter by mode
  let filtered = annotated.filter(c => {
    if (cocktailMode === "makeable") return c.state === "makeable";
    if (cocktailMode === "oneaway") return c.state === "makeable" || c.state === "oneaway";
    return true;
  });

  // Search
  if (cocktailSearch) {
    filtered = filtered.filter(c => c.name.toLowerCase().includes(cocktailSearch));
  }

  // Tags (any-match)
  if (tagFilters.size > 0) {
    filtered = filtered.filter(c => (c.tags || []).some(t => tagFilters.has(t)));
  }

  // Sort
  filtered.sort((a, b) => {
    // State priority: makeable > oneaway > unmakeable (always)
    const stateOrder = { makeable: 0, oneaway: 1, unmakeable: 2 };
    if (stateOrder[a.state] !== stateOrder[b.state]) {
      return stateOrder[a.state] - stateOrder[b.state];
    }
    if (cocktailSort === "name") return a.name.localeCompare(b.name);
    if (cocktailSort === "category") return (a.category || "").localeCompare(b.category || "") || a.name.localeCompare(b.name);
    if (cocktailSort === "ingredients") return a.ingredients.length - b.ingredients.length || a.name.localeCompare(b.name);
    return 0;
  });

  // Stats
  const makeableCount = annotated.filter(c => c.state === "makeable").length;
  const oneawayCount = annotated.filter(c => c.state === "oneaway").length;
  document.getElementById("stats").innerHTML =
    `<b>${makeableCount}</b> makeable · <b>${oneawayCount}</b> one away · ${cocktails.length} total · showing <b>${filtered.length}</b>`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">no cocktails match</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  filtered.forEach(c => frag.appendChild(renderCocktail(c)));
  list.appendChild(frag);
}

function renderCocktail(c) {
  const el = document.createElement("div");
  el.className = "cocktail " + c.state;

  const badge = c.state === "makeable"
    ? '<span class="badge makeable">ready</span>'
    : c.state === "oneaway"
      ? '<span class="badge oneaway">one away</span>'
      : `<span class="badge unmakeable">${c.missingCount} missing</span>`;

  const ingredientsHtml = c.annotated.map(ing => {
    const amt = escapeHtml(ing.amount || "");
    const label = escapeHtml(ing.item || "");

    if (ing.status === "assumed") {
      return `<li>
        <span class="amt">${amt}</span>
        <span><span class="ing">${label}</span> <span class="assumed">(assumed available)</span></span>
      </li>`;
    }
    if (ing.status === "missing") {
      const want = ing.match_name || ing.match_sub_style || ing.match_category;
      return `<li>
        <span class="amt">${amt}</span>
        <span><span class="ing">${label}</span> <span class="missing">${escapeHtml(want)}</span></span>
      </li>`;
    }
    // matched
    const chosen = chosenBottleFor(c.id, ing);
    const optsLink = ing.matches.length > 1
      ? ` <button class="options-link" data-cid="${c.id}" data-iidx="${ing.idx}">${ing.matches.length} options</button>`
      : "";
    return `<li>
      <span class="amt">${amt}</span>
      <span><span class="ing">${label}</span> <span class="bottle">${escapeHtml(chosen.name)}</span>${optsLink}</span>
    </li>`;
  }).join("");

  el.innerHTML = `
    <div class="title-row">
      <h3>${escapeHtml(c.name)}</h3>
      ${badge}
    </div>
    <div class="category">${escapeHtml(c.category || "")}</div>
    <ul class="ingredients">${ingredientsHtml}</ul>
    <div class="method">${escapeHtml(c.method || "")}</div>
    <div class="meta">
      ${c.glass ? `<span><b>glass</b> ${escapeHtml(c.glass)}</span>` : ""}
      ${c.garnish ? `<span><b>garnish</b> ${escapeHtml(c.garnish)}</span>` : ""}
    </div>
    ${c.notes ? `<div class="note">${escapeHtml(c.notes)}</div>` : ""}
    <div class="tags">${(c.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join("")}</div>
  `;

  // Wire up bottle picker links
  el.querySelectorAll(".options-link").forEach(btn => {
    btn.onclick = () => openModal(parseInt(btn.dataset.cid), parseInt(btn.dataset.iidx));
  });

  return el;
}

// ============================================================
// Bottle picker modal
// ============================================================
function openModal(cocktailId, ingIdx) {
  const c = cocktails.find(x => x.id === cocktailId);
  if (!c) return;
  const ing = c.ingredients[ingIdx];
  const matches = bottlesFor(ing);
  if (!matches || matches.length <= 1) return;

  const key = cocktailId + ":" + ingIdx;
  const currentId = bottleChoices[key] || matches[0].id;

  document.getElementById("modal-title").textContent = `Pick a bottle for ${c.name}`;
  document.getElementById("modal-sub").textContent = `Ingredient: ${ing.item}`;

  const optsContainer = document.getElementById("modal-options");
  optsContainer.innerHTML = "";
  matches.forEach(b => {
    const btn = document.createElement("button");
    btn.className = "modal-option" + (b.id === currentId ? " selected" : "");
    btn.innerHTML = `
      <div>${escapeHtml(b.name)}</div>
      <div class="sub2">${escapeHtml(b.producer || "")} · ${escapeHtml(b.sub_style || b.category)}${b.notes ? " · " + escapeHtml(b.notes) : ""}</div>
    `;
    btn.onclick = () => {
      bottleChoices[key] = b.id;
      saveChoices();
      closeModal();
      renderCocktails();
    };
    optsContainer.appendChild(btn);
  });

  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
}

// ============================================================
// Util
// ============================================================
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

// ============================================================
// Go
// ============================================================
load();
</script>
